<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquila Guardian — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f5f5f5;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#151515;border:1px solid #222;border-radius:12px;padding:2.5rem;max-width:400px;width:100%}
h1{font-size:1.3rem;font-weight:700;margin-bottom:.4rem;color:#c9a84c}
.sub{color:#888;font-size:.85rem;margin-bottom:2rem}
label{display:block;font-size:.8rem;color:#aaa;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;padding:.8rem 1rem;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;color:#f5f5f5;font-size:1rem;margin-bottom:1.2rem}
input:focus{outline:none;border-color:#c9a84c}
button{width:100%;padding:.9rem;background:#c9a84c;color:#0d0d0d;border:none;border-radius:8px;font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}
button:hover{background:#f5f5f5}
.err{color:#ef4444;font-size:.82rem;margin-top:.8rem;min-height:1em}
.foot{text-align:center;margin-top:2rem;font-size:.75rem;color:#555}
</style>
</head>
<body>
<div class="card">
  <h1>Aquila Guardian</h1>
  <p class="sub">Sign in with your admin password</p>
  <form id="loginForm">
    <label for="pwd">Password</label>
    <input id="pwd" type="password" autocomplete="current-password" required autofocus>
    <button type="submit">Sign In</button>
    <div class="err" id="err"></div>
  </form>
  <p class="foot">Self-hosted — your data never leaves your server.</p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var err = document.getElementById('err');
  err.textContent = '';
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pwd').value })
    });
    var data = await res.json();
    if (res.ok) {
      window.location.href = '/config.html';
    } else {
      err.textContent = data.error || 'Login failed';
    }
  } catch (e) {
    err.textContent = 'Network error: ' + e.message;
  }
});
// If already logged in, skip straight to config
fetch('/api/auth/session').then(r => r.json()).then(d => {
  if (d.authenticated) window.location.href = '/config.html';
});
</script>
</body>
</html>
