services:
  aquila:
    build: .
    container_name: aquila-guardian
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      # Persist config, voice recording, and seen-tx state across container rebuilds
      - ./data:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
